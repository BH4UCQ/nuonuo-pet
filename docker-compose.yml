version: '3.8'

services:
  # 后端服务
  backend:
    build: ./backend
    container_name: nuonuo-pet-backend
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/nuonuo_pet
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET=${JWT_SECRET:-your-secret-key}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_API_BASE=${OPENAI_API_BASE:-https://api.openai.com/v1}
      - DEBUG=false
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    networks:
      - nuonuo-network

  # 前端服务
  frontend:
    build: ./frontend
    container_name: nuonuo-pet-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - nuonuo-network

  # PostgreSQL 数据库
  db:
    image: postgres:14-alpine
    container_name: nuonuo-pet-db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=nuonuo_pet
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - nuonuo-network

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: nuonuo-pet-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - nuonuo-network

volumes:
  postgres_data:
  redis_data:

networks:
  nuonuo-network:
    driver: bridge
